<!DOCTYPE html>
<html lang="fr" data-theme="default">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ClinoCaisse</title>

  <!-- CSS -->
  <link rel="stylesheet" href="assets/css/themes.css" />
  <link rel="stylesheet" href="assets/css/global.css" />
  <link rel="stylesheet" href="assets/css/animations.css" />

  <!-- Modules CSS -->
  <link rel="stylesheet" href="modules/login/login.css" />
  <link rel="stylesheet" href="modules/dashboard/dashboard.css" />
  <link rel="stylesheet" href="modules/caisse/caisse.css" />
  <link rel="stylesheet" href="modules/stock/stock.css" />

  <link rel="stylesheet" href="modules/utilisateurs/utilisateurs.css" />

</head>
<body>

<div id="app">

  <!-- ── LOGIN ──────────────────────────────────────────────────────── -->
  <div id="view-login" class="view active">
    <!-- Injecté par login.js -->
  </div>

  <!-- ── DASHBOARD ─────────────────────────────────────────────────── -->
  <div id="view-dashboard" class="view">
    <!-- Injecté par dashboard.js -->
  </div>

  <!-- ── CAISSE ────────────────────────────────────────────────────── -->
  <div id="view-caisse" class="view">
    <!-- Injecté par caisse.js -->
  </div>

  <!-- ── STOCK ─────────────────────────────────────────────────────── -->
  <div id="view-stock" class="view">
    <!-- Injecté par stock.js -->
  </div>

  <!-- ── CLÔTURE ───────────────────────────────────────────────────── -->
  <div id="view-cloture" class="view">
    <!-- Injecté par cloture.js -->
  </div>

  <!-- ── UTILISATEURS ──────────────────────────────────────────────── -->
  <div id="view-utilisateurs" class="view">
    <!-- Injecté par utilisateurs.js -->
  </div>

  <!-- ── PARAMÈTRES ────────────────────────────────────────────────── -->
  <div id="view-parametres" class="view">
    <!-- Injecté par parametres.js -->
  </div>

  <!-- ── JOURNAL D'ACTIVITÉ ─────────────────────────────────────────────────── -->
  <div id="view-journal" class="view">
    <!-- Injecté par journal.js -->
  </div>

  <!-- ── CUISINE / BAR ─────────────────────────────────────────────── -->
  <div id="view-cuisine" class="view">
    <!-- Injecté par cuisine.js -->
  </div>

  <!-- ── RÉSERVATIONS ──────────────────────────────────────────────── -->
  <div id="view-reservations" class="view">
    <!-- Injecté par reservations.js -->
  </div>

  <!-- ── FINANCES (Dépenses & Achats) ──────────────────────────────── -->
  <div id="view-finances" class="view">
    <!-- Injecté par finances.js -->
  </div>

  <!-- ── RH (Salaires & Employés) ──────────────────────────────────── -->
  <div id="view-rh" class="view">
    <!-- Injecté par rh.js -->
  </div>

  <!-- ── ANALYTIQUE (Admin) ───────────────────────────── -->
  <div id="view-analytique" class="view">
    <!-- Injecté par analytique.js -->
  </div>

</div>

<!-- Toast container -->
<div id="toast-container"></div>

<!-- Modals Container -->
<div id="modal-container"></div>

<!-- Scripts (ordre : shared → app → modules) -->
<script src="shared/utils.js"></script>
<script src="shared/toast.js"></script>
<script src="shared/modal.js"></script>
<script src="app.js"></script>
<script src="modules/login/login.js"></script>
<script src="modules/dashboard/dashboard.js"></script>
<script src="modules/caisse/caisse.js"></script>

<script src="modules/analytique/analytique.js"></script>
<script src="modules/journal/journal.js"></script>
<script src="modules/cuisine/cuisine.js"></script>
<script src="modules/reservations/reservations.js"></script>
<script src="modules/finances/finances.js"></script>
<script src="modules/rh/rh.js"></script>

</html>
